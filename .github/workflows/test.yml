name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: craft-nexus-contract

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: '["craft-nexus-contract"]'

      - name: cargo check
        run: cargo check --tests

      - name: cargo test
        run: cargo test

      - name: Check snapshot files unchanged
        run: |
          git add --dry-run craft-nexus-contract/test_snapshots/ 2>&1 | head -20
          if git diff --name-only --exit-code craft-nexus-contract/test_snapshots/; then
            echo "Snapshots are up to date."
          else
            echo "ERROR: Snapshot files have changed without being committed."
            echo "If changes are intentional, update snapshots via:"
            echo "  git add craft-nexus-contract/test_snapshots/"
            exit 1
          fi
